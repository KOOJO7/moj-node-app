<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CYPEK CONTROL — lecimyszacunek.pl</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0a;
      --panel: #111;
      --border: #1e1e1e;
      --accent: #00ff88;
      --accent2: #ff3c3c;
      --accent3: #3cf;
      --text: #e0e0e0;
      --dim: #444;
      --font-mono: 'Share Tech Mono', monospace;
      --font-display: 'Bebas Neue', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 39px, #1a1a1a 39px, #1a1a1a 40px),
        repeating-linear-gradient(90deg, transparent, transparent 39px, #1a1a1a 39px, #1a1a1a 40px);
    }

    .shell {
      width: 100%;
      max-width: 420px;
      border: 1px solid var(--border);
      background: var(--panel);
      padding: 30px 24px 24px;
      position: relative;
    }

    /* Narożniki jak w starym sprzęcie */
    .shell::before, .shell::after,
    .shell-inner::before, .shell-inner::after {
      content: '';
      position: absolute;
      width: 12px; height: 12px;
      border-color: var(--accent);
      border-style: solid;
    }
    .shell::before  { top: -1px; left: -1px;  border-width: 2px 0 0 2px; }
    .shell::after   { top: -1px; right: -1px; border-width: 2px 2px 0 0; }
    .shell-inner { position: relative; }
    .shell-inner::before { bottom: -25px; left: -1px;  border-width: 0 0 2px 2px; }
    .shell-inner::after  { bottom: -25px; right: -1px; border-width: 0 2px 2px 0; }

    .header {
      text-align: center;
      margin-bottom: 24px;
    }
    .header h1 {
      font-family: var(--font-display);
      font-size: 3rem;
      letter-spacing: 4px;
      color: var(--accent);
      line-height: 1;
      text-shadow: 0 0 20px rgba(0,255,136,0.4);
    }
    .header .sub {
      font-size: 11px;
      color: var(--dim);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-top: 4px;
    }

    /* STATUS BAR */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border: 1px solid var(--border);
      background: #0d0d0d;
      margin-bottom: 24px;
      font-size: 12px;
      letter-spacing: 1px;
    }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--dim);
      flex-shrink: 0;
      transition: background 0.3s, box-shadow 0.3s;
    }
    .status-dot.connected {
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      animation: pulse 2s infinite;
    }
    .status-dot.error { background: var(--accent2); box-shadow: 0 0 8px var(--accent2); }
    .status-dot.connecting {
      background: #ffaa00;
      box-shadow: 0 0 8px #ffaa00;
      animation: blink 0.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; } 50% { opacity: 0.5; }
    }
    @keyframes blink {
      0%, 100% { opacity: 1; } 50% { opacity: 0; }
    }
    #statusText { color: var(--text); flex: 1; }

    /* PRZYCISK POŁĄCZ */
    .btn-connect {
      width: 100%;
      padding: 14px;
      background: transparent;
      border: 1px solid var(--accent3);
      color: var(--accent3);
      font-family: var(--font-mono);
      font-size: 13px;
      letter-spacing: 3px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 28px;
      position: relative;
      overflow: hidden;
    }
    .btn-connect::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--accent3);
      opacity: 0;
      transition: opacity 0.2s;
    }
    .btn-connect:hover::before { opacity: 0.08; }
    .btn-connect:active { transform: scale(0.99); }
    .btn-connect:disabled { border-color: var(--dim); color: var(--dim); cursor: not-allowed; }
    .btn-connect:disabled::before { display: none; }

    /* SEKCJA WATÓW */
    .waty-section {
      opacity: 0.3;
      pointer-events: none;
      transition: opacity 0.4s;
    }
    .waty-section.active {
      opacity: 1;
      pointer-events: all;
    }

    .section-label {
      font-size: 10px;
      letter-spacing: 4px;
      color: var(--dim);
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    /* WYŚWIETLACZ WATÓW */
    .waty-display {
      text-align: center;
      margin-bottom: 20px;
    }
    .waty-display .value {
      font-family: var(--font-display);
      font-size: 5rem;
      color: var(--accent);
      line-height: 1;
      text-shadow: 0 0 30px rgba(0,255,136,0.3);
      transition: color 0.2s;
    }
    .waty-display .value.changed {
      color: #fff;
      text-shadow: 0 0 30px rgba(255,255,255,0.5);
    }
    .waty-display .unit {
      font-size: 14px;
      color: var(--dim);
      letter-spacing: 3px;
      margin-top: 4px;
    }

    /* SUWAK */
    .slider-wrap {
      margin-bottom: 20px;
      position: relative;
    }
    input[type=range] {
      -webkit-appearance: none;
      width: 100%;
      height: 2px;
      background: var(--border);
      outline: none;
      cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px; height: 18px;
      background: var(--accent);
      border-radius: 0;
      cursor: pointer;
      box-shadow: 0 0 10px rgba(0,255,136,0.5);
      transition: transform 0.1s;
    }
    input[type=range]::-webkit-slider-thumb:active { transform: scale(1.3); }
    .slider-labels {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: var(--dim);
      margin-top: 8px;
    }

    /* PRZYCISKI SZYBKIEGO WYBORU */
    .quick-btns {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
      margin-bottom: 20px;
    }
    .q-btn {
      padding: 8px 4px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--dim);
      font-family: var(--font-mono);
      font-size: 11px;
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
    }
    .q-btn:hover { border-color: var(--accent); color: var(--accent); }
    .q-btn.active {
      background: var(--accent);
      color: #000;
      border-color: var(--accent);
      font-weight: bold;
    }

    /* PRZYCISK WYŚLIJ */
    .btn-send {
      width: 100%;
      padding: 16px;
      background: var(--accent);
      border: none;
      color: #000;
      font-family: var(--font-mono);
      font-size: 14px;
      font-weight: bold;
      letter-spacing: 4px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-send:hover { background: #00ffaa; }
    .btn-send:active { transform: scale(0.99); }
    .btn-send:disabled { background: var(--dim); color: #000; cursor: not-allowed; }

    /* SEND FEEDBACK */
    .send-feedback {
      text-align: center;
      font-size: 11px;
      letter-spacing: 2px;
      height: 18px;
      margin-top: 10px;
      color: transparent;
      transition: color 0.3s;
    }
    .send-feedback.ok { color: var(--accent); }
    .send-feedback.err { color: var(--accent2); }

    /* FOOTER */
    .footer {
      text-align: center;
      margin-top: 28px;
      font-size: 10px;
      color: #2a2a2a;
      letter-spacing: 3px;
    }

    /* iOS / brak Web BT */
    .no-bt-warning {
      display: none;
      padding: 14px;
      border: 1px solid var(--accent2);
      color: var(--accent2);
      font-size: 12px;
      line-height: 1.6;
      text-align: center;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>

<div class="shell">
  <div class="shell-inner">

    <div class="header">
      <h1>CYPEKTAURUS KG200</h1>
      <div class="sub">lecimyszacunek.pl — BLE CONTROL</div>
    </div>

    <div class="no-bt-warning" id="noBtWarning">
      ⚠ Twoja przeglądarka nie obsługuje Web Bluetooth.<br>
      Na iPhone użyj aplikacji <strong>Bluefy</strong>.<br>
      Na Androidzie / PC użyj Chrome.
    </div>

    <div class="status-bar">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Rozłączono</span>
    </div>

    <button class="btn-connect" id="connectBtn" onclick="connectBLE()">
      ▶ POŁĄCZ Z CYPEKTAURUS-BT
    </button>

    <div class="waty-section" id="watySection">
      <div class="section-label">// moc </div>

      <div class="waty-display">
        <div class="value" id="watyDisplay">15</div>
        <div class="unit">WATÓW</div>
      </div>

      <div class="slider-wrap">
        <input type="range" id="watySlider" min="5" max="200" step="5" value="15"
          oninput="onSliderInput(this.value)">
        <div class="slider-labels">
          <span>5W</span>
          <span>50W</span>
          <span>100W</span>
          <span>150W</span>
          <span>200W</span>
        </div>
      </div>

      <div class="quick-btns" id="quickBtns">
        <!-- wypełniane przez JS -->
      </div>

      <button class="btn-send" id="sendBtn" onclick="sendWaty()">
        ↑ WYŚLIJ DO ESP32
      </button>
      <div class="send-feedback" id="sendFeedback"></div>
    </div>

  </div>
</div>

<div class="footer">CYPEKTAURUS KG200 &copy; 2026</div>

<script>
  // ======== UUID — IDENTYCZNE JAK W ARDUINO ========
  const SERVICE_UUID        = "12345678-1234-1234-1234-123456789012";
  const CHARACTERISTIC_UUID = "87654321-4321-4321-4321-210987654321";
  // =================================================

  const QUICK_VALUES = [10, 20, 40, 60, 80, 100, 130, 160, 200];

  let bleDevice = null;
  let bleCharacteristic = null;
  let currentWaty = 15;

  // Sprawdź czy Web Bluetooth jest dostępny
  if (!navigator.bluetooth) {
    document.getElementById('noBtWarning').style.display = 'block';
    document.getElementById('connectBtn').disabled = true;
  }

  // Generuj przyciski szybkiego wyboru
  const quickWrap = document.getElementById('quickBtns');
  QUICK_VALUES.forEach(w => {
    const b = document.createElement('button');
    b.className = 'q-btn';
    b.textContent = w + 'W';
    b.dataset.val = w;
    b.onclick = () => setWaty(w);
    quickWrap.appendChild(b);
  });

  function setStatus(text, state) {
    // state: 'idle' | 'connecting' | 'connected' | 'error'
    document.getElementById('statusText').textContent = text;
    const dot = document.getElementById('statusDot');
    dot.className = 'status-dot';
    if (state === 'connected') dot.classList.add('connected');
    else if (state === 'error') dot.classList.add('error');
    else if (state === 'connecting') dot.classList.add('connecting');
  }

  function setWaty(val) {
    currentWaty = val;
    document.getElementById('watyDisplay').textContent = val;
    document.getElementById('watySlider').value = val;

    // Podświetl aktywny przycisk szybkiego wyboru
    document.querySelectorAll('.q-btn').forEach(b => {
      b.classList.toggle('active', parseInt(b.dataset.val) === val);
    });

    // Flash na wyświetlaczu
    const disp = document.getElementById('watyDisplay');
    disp.classList.add('changed');
    setTimeout(() => disp.classList.remove('changed'), 200);
  }

  function onSliderInput(val) {
    setWaty(parseInt(val));
  }

  async function connectBLE() {
    const btn = document.getElementById('connectBtn');

    // Jeśli już połączono — rozłącz
    if (bleDevice && bleDevice.gatt.connected) {
      bleDevice.gatt.disconnect();
      return;
    }

    try {
      btn.disabled = true;
      setStatus('Skanowanie...', 'connecting');

      bleDevice = await navigator.bluetooth.requestDevice({
        filters: [{ name: 'CYPEK-BT' }],
        optionalServices: [SERVICE_UUID]
      });

      setStatus('Łączenie z ' + bleDevice.name + '...', 'connecting');
      const server = await bleDevice.gatt.connect();

      setStatus('Pobieranie serwisu...', 'connecting');
      const service = await server.getPrimaryService(SERVICE_UUID);

      bleCharacteristic = await service.getCharacteristic(CHARACTERISTIC_UUID);

      // Odczytaj aktualną wartość watów z ESP32
      const val = await bleCharacteristic.readValue();
      const decoder = new TextDecoder();
      const watyFromESP = parseInt(decoder.decode(val));
      if (!isNaN(watyFromESP)) setWaty(watyFromESP);

      setStatus('Połączono: ' + bleDevice.name, 'connected');
      btn.textContent = '■ ROZŁĄCZ';
      btn.disabled = false;
      document.getElementById('watySection').classList.add('active');

      // Obsługa rozłączenia
      bleDevice.addEventListener('gattserverdisconnected', () => {
        setStatus('Rozłączono', 'idle');
        btn.textContent = '▶ POŁĄCZ Z CYPEK-BT';
        btn.disabled = false;
        document.getElementById('watySection').classList.remove('active');
        bleCharacteristic = null;
      });

    } catch (err) {
      console.error(err);
      const msg = err.message || err.toString();
      if (msg.includes('User cancelled') || msg.includes('chooser')) {
        setStatus('Anulowano', 'idle');
      } else {
        setStatus('Błąd: ' + msg, 'error');
      }
      btn.disabled = false;
      btn.textContent = '▶ POŁĄCZ Z CYPEK-BT';
    }
  }

  async function sendWaty() {
    if (!bleCharacteristic) return;
    const feedback = document.getElementById('sendFeedback');
    const btn = document.getElementById('sendBtn');

    try {
      btn.disabled = true;
      const encoder = new TextEncoder();
      await bleCharacteristic.writeValue(encoder.encode(String(currentWaty)));

      feedback.textContent = '✓ WYSŁANO ' + currentWaty + 'W';
      feedback.className = 'send-feedback ok';
    } catch (err) {
      feedback.textContent = '✗ BŁĄD WYSYŁANIA';
      feedback.className = 'send-feedback err';
      console.error(err);
    } finally {
      btn.disabled = false;
      setTimeout(() => { feedback.className = 'send-feedback'; }, 2500);
    }
  }
</script>

</body>
</html>
