<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AUTH — CYPEK CONTROL</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0a; --panel: #111; --border: #1e1e1e;
      --accent: #00ff88; --text: #e0e0e0; --dim: #444; --dim2: #2a2a2a;
      --nav-w: 220px;
      --font-mono: 'Share Tech Mono', monospace;
      --font-display: 'Bebas Neue', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: var(--bg); color: var(--text); font-family: var(--font-mono);
      display: flex; min-height: 100vh;
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 39px, #111 39px, #111 40px),
        repeating-linear-gradient(90deg, transparent, transparent 39px, #111 39px, #111 40px);
    }
    nav {
      width: var(--nav-w); min-height: 100vh; background: #0d0d0d;
      border-right: 1px solid var(--border); display: flex; flex-direction: column;
      padding: 36px 0 24px; position: fixed; top: 0; left: 0; bottom: 0; z-index: 100;
    }
    .nav-logo { padding: 0 24px 32px; border-bottom: 1px solid var(--border); }
    .nav-logo h1 { font-family: var(--font-display); font-size: 1.6rem; letter-spacing: 4px; color: var(--accent); line-height: 1; text-shadow: 0 0 16px rgba(0,255,136,0.3); }
    .nav-logo .sub { font-size: 9px; color: var(--dim); letter-spacing: 3px; margin-top: 5px; text-transform: uppercase; }
    .nav-links { flex: 1; padding: 24px 0; display: flex; flex-direction: column; gap: 2px; }
    .nav-link { display: flex; align-items: center; gap: 12px; padding: 11px 24px; color: var(--dim); text-decoration: none; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; transition: all .15s; border-left: 2px solid transparent; }
    .nav-link .icon { font-size: 14px; width: 18px; text-align: center; flex-shrink: 0; }
    .nav-link:hover { color: var(--text); background: rgba(255,255,255,0.03); border-left-color: var(--dim); }
    .nav-link.active { color: var(--accent); border-left-color: var(--accent); background: rgba(0,255,136,0.04); }
    .nav-footer { padding: 16px 24px; border-top: 1px solid var(--border); font-size: 9px; color: var(--dim2); letter-spacing: 2px; }
    main { margin-left: var(--nav-w); flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px; min-height: 100vh; }
    .login-box { width: 320px; padding: 40px; background: var(--panel); border: 1px solid var(--border); position: relative; text-align: center; }
    .login-box::before,.login-box::after { content: ''; position: absolute; width: 12px; height: 12px; border-color: var(--accent); border-style: solid; }
    .login-box::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
    .login-box::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }
    .login-box h2 { font-family: var(--font-display); font-size: 1.8rem; letter-spacing: 4px; color: var(--accent); margin-bottom: 6px; }
    .login-sub { font-size: 9px; color: var(--dim); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 28px; }
    .divider { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
    .divider::before,.divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .divider span { font-size: 9px; letter-spacing: 3px; color: var(--dim); }
    input[type=password] { width: 100%; background: #000; border: 1px solid var(--border); color: var(--accent); padding: 12px 14px; margin-bottom: 14px; font-family: var(--font-mono); font-size: 14px; outline: none; letter-spacing: 4px; text-align: center; transition: border-color .2s; }
    input[type=password]:focus { border-color: var(--accent); }
    input[type=password]::placeholder { color: var(--dim); letter-spacing: 2px; font-size: 11px; }
    button { width: 100%; padding: 13px; background: var(--accent); border: none; color: #000; font-family: var(--font-mono); font-size: 12px; font-weight: bold; letter-spacing: 4px; text-transform: uppercase; cursor: pointer; transition: all .2s; }
    button:hover { background: #00ffaa; }
    button:active { transform: scale(0.99); }
    .error { color: #ff3c3c; font-size: 11px; margin-top: 12px; letter-spacing: 2px; display: none; }
    @media (max-width: 640px) {
      nav { width:100%; min-height:auto; position:relative; flex-direction:row; flex-wrap:wrap; padding:16px; border-right:none; border-bottom:1px solid var(--border); }
      .nav-logo { padding:0 16px 0 0; border:none; }
      .nav-links { flex-direction:row; padding:0; gap:0; }
      .nav-link { padding:8px 12px; border-left:none; border-bottom:2px solid transparent; font-size:9px; }
      .nav-link.active { border-left:none; border-bottom-color:var(--accent); }
      .nav-footer { display:none; }
      main { margin-left:0; padding:30px 20px; }
      body { flex-direction:column; }
    }
  </style>
</head>
<body>
  <nav>
    <div class="nav-logo"><h1>CYPEK</h1><div class="sub">lecimyszacunek.pl</div></div>
    <div class="nav-links">
      <a href="/home"  class="nav-link"><span class="icon">◈</span> Główna</a>
      <a href="/"      class="nav-link active"><span class="icon">⬡</span> Panel BLE</a>
      <a href="/page3" class="nav-link "><span class="icon">🛒</span> Sklep</a>
      <a href="/kontakt" class="nav-link"><span class="icon">✉</span> Kontakt</a>
    </div>
    <div class="nav-footer">v1.0 &nbsp;·&nbsp; KG200 &nbsp;·&nbsp; 2026</div>
  </nav>
  <main>
    <div class="login-box">
      <h2>PANEL</h2>
      <div class="login-sub">Panel BLE — autoryzacja</div>
      <div class="divider"><span>klucz dostępu</span></div>
      <input type="password" id="pass" placeholder="ENTER ACCESS KEY"
        onkeydown="if(event.key==='Enter') login()">
      <button onclick="login()">AUTORYZUJ →</button>
      <div id="error" class="error">✗ INVALID ACCESS KEY</div>
    </div>
  </main>
  <script>
    async function login() {
      const pass = document.getElementById('pass').value;
      const res = await fetch('/login', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({pass})
      });
      if (res.ok) {
        window.location.href = '/panel';
      } else {
        const err = document.getElementById('error');
        err.style.display = 'block';
        document.getElementById('pass').value = '';
        document.getElementById('pass').focus();
        setTimeout(() => { err.style.display = 'none'; }, 3000);
      }
    }
  </script>
</body>
</html>
